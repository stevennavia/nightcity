<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyberpunk City</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #app { width: 100%; height: 100%; }
    #loading {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: #0a0a1a;
      color: #00c8ff; z-index: 10; font-size: 1.2rem; gap: 1rem;
      font-family: monospace;
    }
    #loading .spinner {
      width: 40px; height: 40px; border: 3px solid rgba(0,200,255,0.2);
      border-top-color: #00c8ff; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading.hidden { display: none; }
  </style>
</head>
<body>
  <div id="app">
    <div id="loading">
      <div class="spinner"></div>
      <p>Cargando Cyberpunk City...</p>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
